name: Code Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run code-reviewer agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a code reviewer. Review this PR following the instructions in .claude/agents/code-reviewer.md.
            Read the diff with 'gh pr diff ${{ github.event.pull_request.number }}'.
            Post your structured review as a PR comment using 'gh pr review'.
