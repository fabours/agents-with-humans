name: Code Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run code-reviewer agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "claude[bot]"
          claude_args: "--allowedTools Bash,Read"
          prompt: |
            You are a code reviewer. Follow .claude/agents/code-reviewer.md strictly.

            Steps:
            1. Read the PR body with: gh pr view ${{ github.event.pull_request.number }}
            2. Read the diff with: gh pr diff ${{ github.event.pull_request.number }}
            3. Check the PR checklist items explicitly:
               - [ ] No secrets committed → scan diff for keys, tokens, .env files
               - [ ] Tests written (backend) → verify test files are in the diff
               - [ ] Follows file structure conventions → check paths match CLAUDE.md
            4. Post your review using: gh pr review ${{ github.event.pull_request.number }} --comment --body "..."

            Your review MUST include a checklist section:
            ## Checklist verification
            - ✅ or ❌ No secrets committed
            - ✅ or ❌ Tests written
            - ✅ or ❌ File structure correct

            If any ❌ → end with: gh pr review ${{ github.event.pull_request.number }} --request-changes --body "..."
            If all ✅ → end with: gh pr review ${{ github.event.pull_request.number }} --approve --body "..."
