name: Issue Implementation Agent

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'agent'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run implementation agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Bash,Read,Write,Edit,TodoWrite"
          prompt: |
            Read issue #${{ github.event.issue.number }}:
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            Based on the title and content of the issue, choose the right role:
            - If it touches /backend → follow .claude/agents/backend-dev.md
            - If it touches /frontend → follow .claude/agents/frontend-dev.md
            - If it touches both → implement backend first, then frontend

            IMPORTANT: Do NOT spawn subagents. Execute all steps yourself directly:
            1. Read CLAUDE.md and the relevant agent file in .claude/agents/
            2. Create a feature branch with: git checkout -b feat/issue-${{ github.event.issue.number }}-<short-description>
            3. Implement the feature
            4. Run tests if backend
            5. Commit, push and open a PR using: gh pr create

            Read .claude/skills/open-pr/SKILL.md for the PR format.
