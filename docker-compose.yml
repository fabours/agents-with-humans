services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      BACKEND_URL: "http://backend:8000"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
